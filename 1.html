<head>

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Dancing+Script&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg-color: #ffffff;
      --text-color: #1e1e1e;
      --glass-bg: rgba(255, 255, 255, 0.1);
      --highlight-color: #007acc;
      --link-hover: #005a9e;
      --name-color: #00aaff;
      --job-color: #615e63;
      --glow-color: #00ccff;
      --icon-bg: #f0f0f0;
      --white: #ffffff;
      --yellow-hover: #ffeb3b;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      margin: 0;
      padding: 0;
      background-color: var(--bg-color);
      background-image: url('https://lightwallpapers.com/downloads/wallpaper-portfolio/4.photo-1518655048521-f130df041f66.jpg');
      background-size: cover;
      background-repeat: no-repeat;
      background-attachment: fixed;
      background-position: center;
      color: var(--text-color);
      text-align: center;
    }

    .container {
      max-width: 700px;
      margin: 100px auto;
      background: var(--glass-bg);
      backdrop-filter: blur(15px);
      padding: 40px;
      border-radius: 16px;
      box-shadow: 0 0 25px rgba(0, 0, 0, 0.3);
    }

    .profile-img {
      width: 150px;
      height: 150px;
      border-radius: 50%;
      object-fit: cover;
      margin-bottom: 20px;
      box-shadow: 0 0 10px #00ccff40, 0 0 20px #00ccff40;
      transition: 0.5s;
    }

    .profile-img:hover {
      transform: scale(1.1) rotate(2deg);
      box-shadow: 0 0 10px #fffb00, 0 0 25px #fffb00;
      filter: brightness(1.1) saturate(1.2);
    }

    h1 {
      margin-bottom: 10px;
      color: var(--name-color);
      font-family: 'Dancing Script', cursive;
      font-size: 38px;
    }

    p {
      font-size: 18px;
      line-height: 1.6;
      font-family: 'Caprasimo', sans-serif;
      color: var(--job-color);
      text-transform: uppercase;
    }

    .icons {
      margin-top: 30px;
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
    }

    .icons img {
      width: 50px;
      height: 50px;
      margin: 10px;
      padding: 8px;
      border-radius: 12px;
      background-color: var(--icon-bg);
      transition: 0.3s;
    }

    .icons img:hover {
      transform: scale(1.15);
      box-shadow: 0 0 8px var(--glow-color), 0 0 15px var(--glow-color);
    }

    footer {
      padding: 30px 0 10px;
      background: transparent;
    }

    .footer-icons {
      display: flex;
      justify-content: center;
      gap: 30px;
    }

    .footer-icons a img {
      width: 28px;
      height: 28px;
      transition: 0.3s;
    }

    .footer-icons a img:hover {
      transform: scale(1.2);
      filter: drop-shadow(0 0 5px var(--glow-color)) drop-shadow(0 0 10px var(--glow-color));
    }

    .footer-text {
      margin-top: 15px;
      font-size: 14px;
      color: var(--text-color);
      opacity: 0.7;
    }

    .glow-hover:hover {
      color: #00ccff;
      text-shadow: 0 0 5px #00ccff, 0 0 10px #00ccff;
    }

    .welcome-modal {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0, 0, 0, 0.4);
      backdrop-filter: blur(6px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
    }

    .modal-content {
      background: rgba(255, 255, 255, 0.25);
      border: 2px solid #00ccff;
      border-radius: 20px;
      padding: 30px;
      text-align: center;
      box-shadow: 0 0 25px #00ccff80;
      max-width: 400px;
      animation: fadeZoom 0.5s ease;
    }

    .modal-content p {
      color: var(--white);
      font-weight: bold;
      margin: 12px 0;
      font-size: 18px;
      transition: color 0.3s ease;
      cursor: default;
    }

    .modal-content p:hover {
      color: var(--yellow-hover);
    }

    .close-btn {
      margin-top: 15px;
      padding: 10px 20px;
      border: none;
      border-radius: 8px;
      background-color: #00ccff;
      color: white;
      cursor: pointer;
      font-weight: bold;
      transition: 0.3s;
    }

    .close-btn:hover {
      background-color: #009ecf;
    }

    .wave {
      display: inline-block;
      animation: wave 2s infinite;
      transform-origin: 70% 70%;
      font-size: 26px;
    }

    @keyframes wave {
      0% { transform: rotate(0deg); }
      15% { transform: rotate(15deg); }
      30% { transform: rotate(-10deg); }
      45% { transform: rotate(15deg); }
      60% { transform: rotate(0deg); }
      100% { transform: rotate(0deg); }
    }

    @keyframes fadeZoom {
      from { opacity: 0; transform: scale(0.8); }
      to { opacity: 1; transform: scale(1); }
    }

    /* Notification Bell */
    .notification-bell {
      position: fixed;
      top: 20px;
      right: 20px;
      cursor: pointer;
      z-index: 10000;
    }

    .notification-bell img {
      width: 40px;
      height: 40px;
      animation: ring 2s infinite;
      transition: transform 0.3s ease;
    }

    .notification-bell:hover img {
      transform: scale(1.1);
    }

    .notification-count {
      position: absolute;
      top: -5px;
      right: -5px;
      background-color: red;
      color: white;
      font-size: 12px;
      font-weight: bold;
      border-radius: 50%;
      padding: 3px 6px;
      box-shadow: 0 0 5px rgba(0,0,0,0.3);
    }

    @keyframes ring {
      0% { transform: rotate(0deg); }
      1% { transform: rotate(15deg); }
      3% { transform: rotate(-10deg); }
      5% { transform: rotate(15deg); }
      7% { transform: rotate(-10deg); }
      10% { transform: rotate(0deg); }
      100% { transform: rotate(0deg); }
    }

    /* Toast Notification */
    .toast-message {
      position: fixed;
      top: 80px;
      right: 20px;
      background-color: #00ccff;
      color: white;
      padding: 14px 18px;
      border-radius: 10px;
      font-weight: bold;
      box-shadow: 0 0 15px #00ccff80;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.5s ease, transform 0.5s ease;
      z-index: 10000;
    }

    .toast-message.show {
      opacity: 1;
      transform: translateY(10px);
      pointer-events: auto;
    }
  </style>

  <script>
    window.addEventListener('DOMContentLoaded', () => {
      const modal = document.getElementById('welcomeModal');
      const closeBtn = document.getElementById('closeModal');
      closeBtn.addEventListener('click', () => {
        modal.style.display = 'none';
      });
    });

    function showToast() {
      const toast = document.getElementById('toast');
      const sound = document.getElementById('notifySound');
      sound.currentTime = 0;
      sound.play();
      toast.classList.add('show');
      setTimeout(() => {
        toast.classList.remove('show');
      }, 4000);
    }
  </script>
</head>
<body>

  <div class="notification-bell" onclick="showToast()">

    <span class="notification-count">1</span>
  </div>

  <!-- Audio Alert -->
  <audio id="notifySound" src="https://notificationsounds.com/storage/sounds/file-sounds-1152-pristine.mp3" preload="auto"></audio>

  <!-- Toast Message -->
